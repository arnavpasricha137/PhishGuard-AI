version: '3.8'

services:
  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: phishguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - phishguard-network

  # FastAPI backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phishguard-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - BACKEND_PORT=8000
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - phishguard-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  phishguard-network:
    driver: bridge
