<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PhishGuard AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="app">

  <header class="header">
    <div class="brand">
      <div class="shield-wrap">
        <svg class="shield-svg" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L4 5.5v6c0 4.75 3.5 9.2 8 10.5 4.5-1.3 8-5.75 8-10.5v-6L12 2z"
                stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="shield-glow"></div>
      </div>
      <div class="brand-text">
        <div class="brand-name">PhishGuard</div>
        <div class="brand-sub">AI · Security</div>
      </div>
    </div>
    <label class="toggle" title="Enable protection">
      <input type="checkbox" id="enable-toggle" checked>
      <span class="track"><span class="thumb"></span></span>
    </label>
  </header>

  <div class="status-bar">
    <div class="s-item">
      <span class="dot" id="backend-dot"></span>
      <span class="s-text" id="backend-label">Connecting…</span>
    </div>
    <span class="s-sep"></span>
    <div class="s-item">
      <span class="dot dot-blue"></span>
      <span class="s-text">BERT · Active</span>
    </div>
  </div>

  <div class="tab-row">
    <svg class="tab-icon-svg" viewBox="0 0 20 20" fill="currentColor">
      <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
      <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
    </svg>
    <span id="tab-status">No email open</span>
  </div>

  <footer class="footer">
    <a href="#" id="settings-link" class="f-link">
      <svg viewBox="0 0 16 16" fill="currentColor" width="11" height="11">
        <path d="M8 4.754a3.246 3.246 0 100 6.492 3.246 3.246 0 000-6.492zM5.754 8a2.246 2.246 0 114.492 0 2.246 2.246 0 01-4.492 0z"/>
        <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 01-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 01-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 01.52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 011.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 011.255-.52l.292.16c1.64.892 3.433-.902 2.54-2.541l-.159-.292a.873.873 0 01.52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 01-.52-1.255l.16-.292c.892-1.64-.901-3.433-2.541-2.54l-.292.159a.873.873 0 01-1.255-.52l-.094-.319z"/>
      </svg>
      Settings
    </a>
    <span class="f-ver">v1.0.0</span>
  </footer>

</div>
<script src="popup.js"></script>
</body>
</html>
